<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS 網頁版 Minecraft</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; }
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background-color: rgba(10, 10, 25, 0.7);
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 20px; cursor: pointer; text-align: center;
            backdrop-filter: blur(5px); z-index: 10;
        }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00ffcc;
            background: rgba(10, 10, 20, 0.85); padding: 15px; border-radius: 10px;
            pointer-events: none; border: 1px solid #00ffcc; font-family: monospace;
            z-index: 5;
        }
        #hotbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6); padding: 10px; border-radius: 5px;
            display: flex; gap: 10px; border: 2px solid #333; z-index: 5;
        }
        .slot {
            width: 50px; height: 50px; border: 2px solid #555;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 12px; background: #222;
        }
        .slot.active { border-color: #fff; background: #555; }
        .crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 2;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.8);
        }
        .crosshair::before { top: 5px; left: 0; width: 12px; height: 2px; }
        .crosshair::after { top: 0; left: 5px; width: 2px; height: 12px; }
    </style>
</head>
<body>

    <div id="blocker">
        <div>
            <h1 style="color: #55ff55; margin-bottom: 10px;">⚡ 網頁版 Minecraft 創世測試 ⚡</h1>
            <p>點擊畫面 開始創造世界</p>
            <div style="font-size: 14px; color: #aaa; text-align: left; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 5px;">
                • 移動：WASD / 方向鍵<br>
                • 破壞方塊：<b>滑鼠左鍵</b><br>
                • 放置方塊：<b>滑鼠右鍵</b><br>
                • 選取方塊種類：數字鍵 <b>1 ~ 4</b><br>
                • 原地救援重置：按 <b>R</b> 鍵 | 釋放滑鼠：按 ESC
            </div>
        </div>
    </div>

    <div class="crosshair"></div>

    <div id="ui">
        [Minecraft 狀態面板]<br>
        -----------------<br>
        座標 X: <span id="posX">0</span> | Y: <span id="posY">0</span> | Z: <span id="posZ">0</span><br>
        手中方塊: <span id="currentBlockText" style="color:#fff;">草地方塊</span>
    </div>

    <div id="hotbar">
        <div class="slot active" id="slot1">1<br>草地</div>
        <div class="slot" id="slot2">2<br>泥土</div>
        <div class="slot" id="slot3">3<br>石頭</div>
        <div class="slot" id="slot4">4<br>玻璃</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- 1. 場景與基礎光影設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ec0ee); // 經典麥塊藍天
        scene.fog = new THREE.FogExp2(0x7ec0ee, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // 關閉反鋸齒更有像素感
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.6);
        sunLight.position.set(50, 100, 30);
        scene.add(sunLight);

        // --- 2. 方塊材質包定義 (無外部圖片，純顏色模擬麥塊色調) ---
        const blockTypes = {
            1: { name: "草地方塊", color: 0x55ff55 },
            2: { name: "泥土方塊", color: 0x866043 },
            3: { name: "石頭方塊", color: 0x808080 },
            4: { name: "玻璃方塊", color: 0xaaccff, transparent: true, opacity: 0.6 }
        };
        let selectedBlockType = 1;

        // 方塊大集合（世界地圖存儲結構）
        const worldBlocks = []; 
        const blockGrid = {}; // 用座標做 Key 方便 O(1) 快速查詢物理碰撞
        const boxGeometry = new THREE.BoxGeometry(1, 1, 1);

        function addBlockToWorld(x, y, z, typeId) {
            const bInfo = blockTypes[typeId];
            const mat = new THREE.MeshStandardMaterial({ 
                color: bInfo.color, 
                transparent: bInfo.transparent || false, 
                opacity: bInfo.opacity || 1.0,
                roughness: 0.9
            });
            const mesh = new THREE.Mesh(boxGeometry, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            worldBlocks.push(mesh);
            blockGrid[`${x},${y},${z}`] = mesh;
        }

        // --- 3. 隨機麥塊地形生成 (20x20 規模體積) ---
        const WORLD_SIZE = 25;
        for (let x = -WORLD_SIZE; x < WORLD_SIZE; x++) {
            for (let z = -WORLD_SIZE; z < WORLD_SIZE; z++) {
                // 使用正弦函數模擬丘陵起伏高度
                const height = Math.floor((Math.sin(x * 0.2) + Math.cos(z * 0.2)) * 2) + 5;
                
                // 最頂層是草地
                addBlockToWorld(x, height, z, 1);
                // 往下兩層是泥土
                addBlockToWorld(x, height - 1, z, 2);
                addBlockToWorld(x, height - 2, z, 2);
                // 再往下全是石頭
                for (let y = height - 3; y >= 0; y--) {
                    addBlockToWorld(x, y, z, 3);
                }
            }
        }

        // --- 4. 玩家控制與物理變數 ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        blocker.addEventListener('click', () => { controls.lock(); });
        controls.addEventListener('lock', () => { blocker.style.display = 'none'; });
        controls.addEventListener('unlock', () => { blocker.style.display = 'flex'; });

        let keys = { w: false, a: false, s: false, d: false };
        let velocity = new THREE.Vector3();
        let canJump = true;
        const PLAYER_HEIGHT = 1.6;

        // 初始安全出生點位置
        camera.position.set(0, 10, 0);

        // --- 5. 挖礦與蓋建築核心 (Raycaster 互動) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // 永遠瞄準畫面正中央

        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;

            // 從相機（準心）發射射線，距離極限為 6 格
            raycaster.setFromCamera(mouse, camera);
            raycaster.far = 6;
            const intersects = raycaster.intersectObjects(worldBlocks);

            if (intersects.length > 0) {
                const intersect = intersects[0];

                if (e.button === 0) {
                    // 【左鍵：破壞方塊】
                    scene.remove(intersect.object);
                    const index = worldBlocks.indexOf(intersect.object);
                    if (index > -1) worldBlocks.splice(index, 1);
                    // 從網格索引移除
                    const p = intersect.object.position;
                    delete blockGrid[`${p.x},${p.y},${p.z}`];

                } else if (e.button === 2) {
                    // 【右鍵：放置方塊】
                    // 根據擊中方塊的「面法線 (Normal)」計算出新方塊該放置的網格座標
                    const normal = intersect.face.normal;
                    const newX = Math.round(intersect.object.position.x + normal.x);
                    const newY = Math.round(intersect.object.position.y + normal.y);
                    const newZ = Math.round(intersect.object.position.z + normal.z);

                    // 檢查目標格子是不是空的，且不能卡在玩家身體裡
                    const playerGridX = Math.round(camera.position.x);
                    const playerGridY = Math.floor(camera.position.y);
                    const playerGridZ = Math.round(camera.position.z);

                    if (!blockGrid[`${newX},${newY},${newZ}`]) {
                        if (!(newX === playerGridX && newZ === playerGridZ && (newY === playerGridY || newY === playerGridY - 1))) {
                            addBlockToWorld(newX, newY, newZ, selectedBlockType);
                        }
                    }
                }
            }
        });

        // 阻斷瀏覽器預設的右鍵選單
        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- 6. 快捷鍵與方塊切換 ---
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
            
            if (e.code === 'Digit1') switchSlot(1);
            if (e.code === 'Digit2') switchSlot(2);
            if (e.code === 'Digit3') switchSlot(3);
            if (e.code === 'Digit4') switchSlot(4);

            if (e.code === 'Space' && canJump) { velocity.y = 12; canJump = false; }
            if (e.code === 'KeyR') camera.position.set(0, 12, 0); // R鍵高空重置救援
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
        });

        function switchSlot(slotId) {
            selectedBlockType = slotId;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById(`slot${slotId}`).classList.add('active');
            document.getElementById('currentBlockText').innerText = blockTypes[slotId].name;
        }

        // --- 7. 麥塊經典物理與遊戲循環 ---
        const clock = new THREE.Clock();
        const uiX = document.getElementById('posX');
        const uiY = document.getElementById('posY');
        const uiZ = document.getElementById('posZ');

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = Math.min(clock.getDelta(), 0.1);

                // 阻尼與重力加速度
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 32.0 * delta; // 重力

                // 玩家移動方向
                const moveDir = new THREE.Vector3();
                moveDir.z = Number(keys.w) - Number(keys.s);
                moveDir.x = Number(keys.d) - Number(keys.a);
                moveDir.normalize();

                if (keys.w || keys.s) velocity.z -= moveDir.z * 150.0 * delta;
                if (keys.a || keys.d) velocity.x -= moveDir.x * 150.0 * delta;

                // 水平位移應用
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                // 垂直位移與方塊網格物理碰撞（Voxel-based Collision）
                camera.position.y += velocity.y * delta;

                const pX = Math.round(camera.position.x);
                const pY = Math.floor(camera.position.y - PLAYER_HEIGHT);
                const pZ = Math.round(camera.position.z);

                // 檢測腳底下方有沒有方塊
                const standBlock = blockGrid[`${pX},${pY},${pZ}`] || blockGrid[`${pX},${pY - 1},${pZ}`];

                if (standBlock) {
                    // 如果踩在方塊上，停止下落
                    const targetY = standBlock.position.y + 1 + PLAYER_HEIGHT;
                    if (camera.position.y <= targetY) {
                        velocity.y = 0;
                        camera.position.y = targetY;
                        canJump = true;
                    }
                }

                // 掉入虛空保護
                if (camera.position.y < -10) {
                    camera.position.set(0, 12, 0);
                    velocity.set(0,0,0);
                }

                // 更新 UI
                uiX.innerText = Math.round(camera.position.x);
                uiY.innerText = Math.round(camera.position.y - PLAYER_HEIGHT);
                uiZ.innerText = Math.round(camera.position.z);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
