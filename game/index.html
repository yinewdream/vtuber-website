<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極致 3D 開放世界 - Skin 完美解析版</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background-color: rgba(10, 10, 25, 0.7);
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 20px; cursor: pointer; text-align: center;
            backdrop-filter: blur(5px); transition: 0.3s; z-index: 10;
        }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00ffcc;
            background: rgba(10, 10, 20, 0.85); padding: 15px; border-radius: 10px;
            pointer-events: none; border: 1px solid #00ffcc; font-family: monospace;
            z-index: 5;
        }
        #control-panel {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(10, 10, 20, 0.9); padding: 15px; border-radius: 10px;
            border: 1px solid #ff007f; color: white; font-size: 14px;
            z-index: 20; display: flex; flex-direction: column; gap: 10px;
        }
        .btn {
            background: #ff007f; color: white; border: none; padding: 8px 12px;
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn:hover { background: #ff55a3; }
        input[type="file"] { display: none; }
        .file-label {
            background: #00aaff; color: white; padding: 8px 12px; text-align: center;
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .file-label:hover { background: #55ccff; }
        .crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255,255,255,0.7); transform: translate(-50%, -50%);
            pointer-events: none; z-index: 2;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div>
            <h1 style="color: #00ffcc; margin-bottom: 10px;">極致開放世界 2.2</h1>
            <p>點擊畫面 進入世界</p>
            <div style="font-size: 14px; color: #aaa; text-align: left; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 5px;">
                • 移動：WASD / 方向鍵<br>
                • 衝刺：按住 Shift 鍵 | 跳躍：SPACE 鍵<br>
                • 切換視角：按 <b>V</b> 鍵<br>
                • 卡住原地復活：按 <b>R</b> 鍵<br>
                • <b>解鎖滑鼠點右下角：按 ESC 鍵</b>
            </div>
        </div>
    </div>

    <div class="crosshair" id="crosshair"></div>

    <div id="ui">
        [玩家狀態系統]<br>
        -----------------<br>
        座標 X: <span id="posX">0</span> | Z: <span id="posZ">0</span><br>
        高度 Y: <span id="posY">0</span><br>
        速度: <span id="speedStatus">正常</span><br>
        視角: <span id="viewStatus">第一人稱</span>
    </div>

    <div id="control-panel">
        <b style="color: #00ffcc;">遊戲控制台 (按ESC釋放游標)</b>
        <button class="btn" id="toggleViewBtn">切換視角 (V)</button>
        <label class="file-label">
            上傳 Minecraft Skin
            <input type="file" id="skinInput" accept="image/png">
        </label>
        <span style="font-size: 11px; color: #aaa;">支援標準 64x64 PNG 圖片</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- 1. 場景與相機初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e); 
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.012);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2; // 稍微調亮整體曝光
        document.body.appendChild(renderer.domElement);

        // --- 2. 光影系統（大幅度加強亮度，避免角色過黑） ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9); // 調高環境光到 0.9，全身無死角變亮
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(50, 200, 50);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // --- 3. 地面 ---
        const floorGeo = new THREE.PlaneGeometry(3000, 3000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x121214, roughness: 0.4, metalness: 0.2 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- 4. 隨機 PBR 建築物 ---
        const objects = [];
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        for (let i = 0; i < 400; i++) {
            const colors = [0x00ffcc, 0xff007f, 0x7000ff, 0x333333, 0x222244];
            const boxMat = new THREE.MeshStandardMaterial({ 
                color: colors[Math.floor(Math.random() * colors.length)],
                roughness: 0.4,
                metalness: 0.5
            });
            const mesh = new THREE.Mesh(boxGeo, boxMat);
            const w = Math.random() * 15 + 4;
            const h = Math.random() * (Math.random() > 0.8 ? 80 : 25) + 3;
            const d = Math.random() * 15 + 4;
            mesh.scale.set(w, h, d);
            
            let x = Math.random() * 1000 - 500;
            let z = Math.random() * 1000 - 500;
            if (Math.abs(x) < 30 && Math.abs(z) < 30) { x += 50; z += 50; }
            mesh.position.set(x, h / 2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            objects.push(mesh);
        }

        // --- 5. 玩家模型（Minecraft Skin 正統解析器） ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // 預設外觀
        const defaultMaterial = new THREE.MeshStandardMaterial({ color: 0x00ffcc, roughness: 0.5 });
        
        // 建立方塊人骨架
        const headMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), defaultMaterial); headMesh.position.y = 1.375;
        const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.75, 0.25), defaultMaterial); bodyMesh.position.y = 0.75;
        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.75, 0.25), defaultMaterial); leftArm.position.set(-0.375, 0.75, 0);
        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.75, 0.25), defaultMaterial); rightArm.position.set(0.375, 0.75, 0);
        const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.75, 0.25), defaultMaterial); leftLeg.position.set(-0.125, 0.375, 0);
        const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.75, 0.25), defaultMaterial); rightLeg.position.set(0.125, 0.375, 0);

        playerGroup.add(headMesh, bodyMesh, leftArm, rightArm, leftLeg, rightLeg);
        playerGroup.position.set(0, 0, 0); 

        // 核心功能：切割 2D 圖片並轉為 3D 方塊的 6 個面材質 (Minecraft 標準 64x64 格式)
        function getCubeMaterials(texture, u, v, w, h, d) {
            const mats = [];
            // 六個面的貼圖順序：右(加X)、左(減X)、上(加Y)、下(減Y)、前(加Z)、後(減Z)
            const faces = [
                { x: u + d + w, y: v + d,     w: d, h: h }, // 右
                { x: u,         y: v + d,     w: d, h: h }, // 左
                { x: u + d,     y: v,         w: w, h: d }, // 上
                { x: u + d + w, y: v,         w: w, h: d }, // 下
                { x: u + d,     y: v + d,     w: w, h: h }, // 前
                { x: u + d + w + d, y: v + d, w: w, h: h }  // 後
            ];

            faces.forEach(f => {
                const texClone = texture.clone();
                texClone.needsUpdate = true;
                
                // 計算 UV 映射區塊
                texClone.repeat.set(f.w / 64, f.h / 64);
                texClone.offset.set(f.x / 64, 1 - (f.y + f.h) / 64);

                mats.push(new THREE.MeshStandardMaterial({ 
                    map: texClone, 
                    roughness: 0.6,
                    metalness: 0.1
                }));
            });
            return mats;
        }

        // 監聽 Skin 上傳
        document.getElementById('skinInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const texture = new THREE.Texture(img);
                        texture.magFilter = THREE.NearestFilter;
                        texture.minFilter = THREE.NearestFilter;
                        texture.needsUpdate = true;

                        // 依據標準 Minecraft Skin 像素網格進行精準切片 (U, V, 寬, 高, 深)
                        headMesh.material = getCubeMaterials(texture, 0, 0, 8, 8, 8);     // 頭
                        bodyMesh.material = getCubeMaterials(texture, 16, 16, 8, 12, 4);   // 身體
                        rightArm.material = getCubeMaterials(texture, 40, 16, 4, 12, 4);   // 右手
                        leftArm.material = getCubeMaterials(texture, 32, 48, 4, 12, 4);    // 左手 (相容新版/雙層)
                        rightLeg.material = getCubeMaterials(texture, 0, 16, 4, 12, 4);    // 右腳
                        leftLeg.material = getCubeMaterials(texture, 16, 48, 4, 12, 4);    // 左腳
                        
                        // 萬一 Skin 是舊版 64x32 規格，將左肢複製右肢貼圖
                        if (img.height === 32) {
                            leftArm.material = rightArm.material;
                            leftLeg.material = rightLeg.material;
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // --- 6. 視角系統 ---
        let currentView = "first"; 
        const crosshair = document.getElementById('crosshair');
        const viewStatus = document.getElementById('viewStatus');

        function switchView() {
            if (currentView === "first") {
                currentView = "third";
                playerGroup.visible = true;
                crosshair.style.display = "none";
                viewStatus.innerText = "第三人稱";
            } else {
                currentView = "first";
                playerGroup.visible = false;
                crosshair.style.display = "block";
                viewStatus.innerText = "第一人稱";
            }
        }

        document.getElementById('toggleViewBtn').addEventListener('mousedown', (e) => {
            controls.unlock();
            switchView();
        });
        document.getElementById('skinInput').addEventListener('click', () => {
            controls.unlock();
        });

        // --- 7. 移動與物理系統 ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        blocker.addEventListener('click', () => { controls.lock(); });
        controls.addEventListener('lock', () => { blocker.style.display = 'none'; });
        controls.addEventListener('unlock', () => { blocker.style.display = 'flex'; });

        let keys = { w: false, a: false, s: false, d: false, shift: false };
        let canJump = true;
        let velocity = new THREE.Vector3();
        
        const PLAYER_HEIGHT = 1.6;

        const raycasterDown = new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0, -1, 0), 0, 0.2);
        const raycasterSides = [
            new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(1, 0, 0), 0, 0.6),
            new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(-1, 0, 0), 0, 0.6),
            new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0, 0, 1), 0, 0.6),
            new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0, 0, -1), 0, 0.6)
        ];

        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = true;
            if (e.code === 'KeyV') switchView();
            if (e.code === 'KeyR') { playerGroup.position.set(0, 0, 0); velocity.set(0,0,0); }
            if (e.code === 'Space' && canJump) { velocity.y = 30; canJump = false; }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = false;
        });

        playerGroup.visible = false;

        // --- 8. 遊戲主循環 ---
        const clock = new THREE.Clock();
        const uiX = document.getElementById('posX');
        const uiY = document.getElementById('posY');
        const uiZ = document.getElementById('posZ');
        const speedStatus = document.getElementById('speedStatus');

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                const delta = Math.min(clock.getDelta(), 0.1);

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 10.0 * delta;

                const direction = new THREE.Vector3();
                direction.z = Number(keys.w) - Number(keys.s);
                direction.x = Number(keys.d) - Number(keys.a);
                direction.normalize();

                const currentSpeed = keys.shift ? 500.0 : 300.0;
                speedStatus.innerText = keys.shift ? "衝刺中 ⚡" : "正常";

                if (keys.w || keys.s) velocity.z -= direction.z * currentSpeed * delta;
                if (keys.a || keys.d) velocity.x -= direction.x * currentSpeed * delta;

                const playerPos = playerGroup.position;

                let collideForward = false, collideBackward = false, collideLeft = false, collideRight = false;
                const checkPos = playerPos.clone().add(new THREE.Vector3(0, 0.5, 0));
                
                raycasterSides[0].ray.origin.copy(checkPos); if (raycasterSides[0].intersectObjects(objects).length > 0) collideRight = true;
                raycasterSides[1].ray.origin.copy(checkPos); if (raycasterSides[1].intersectObjects(objects).length > 0) collideLeft = true;
                raycasterSides[2].ray.origin.copy(checkPos); if (raycasterSides[2].intersectObjects(objects).length > 0) collideBackward = true;
                raycasterSides[3].ray.origin.copy(checkPos); if (raycasterSides[3].intersectObjects(objects).length > 0) collideForward = true;

                if (collideForward && velocity.z < 0) velocity.z = 0;
                if (collideBackward && velocity.z > 0) velocity.z = 0;
                if (collideRight && velocity.x > 0) velocity.x = 0;
                if (collideLeft && velocity.x < 0) velocity.x = 0;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                playerPos.y += (velocity.y * delta);

                raycasterDown.ray.origin.copy(playerPos).add(new THREE.Vector3(0, 0.1, 0));
                const intersections = raycasterDown.intersectObjects(objects);
                const onObject = intersections.length > 0;

                if (onObject === true) {
                    const hitObject = intersections[0];
                    if (velocity.y < 0 && playerPos.y <= hitObject.point.y) {
                        velocity.y = 0;
                        playerPos.y = hitObject.point.y;
                        canJump = true;
                    }
                } else if (playerPos.y <= 0) {
                    velocity.y = 0;
                    playerPos.y = 0;
                    canJump = true;
                }

                // 同步旋轉：讓角色面向前方的同時，頭部稍微跟隨視角
                playerGroup.rotation.y = camera.rotation.y + Math.PI;

                // 奔跑肢體動畫
                if (keys.w || keys.s || keys.a || keys.d) {
                    const speedFactor = keys.shift ? 15 : 10;
                    const angle = Math.sin(Date.now() * 0.001 * speedFactor) * 0.6;
                    leftLeg.rotation.x = angle; rightLeg.rotation.x = -angle;
                    leftArm.rotation.x = -angle; rightArm.rotation.x = angle;
                } else {
                    leftLeg.rotation.x = 0; rightLeg.rotation.x = 0;
                    leftArm.rotation.x = 0; rightArm.rotation.x = 0;
                }

                // 視角同步
                if (currentView === "first") {
                    camera.position.copy(playerPos).add(new THREE.Vector3(0, PLAYER_HEIGHT, 0));
                } else {
                    const backVector = new THREE.Vector3(0, 0, 1).applyQuaternion(camera.quaternion);
                    backVector.y = 0;
                    backVector.normalize();
                    const targetCamPos = playerPos.clone()
                        .add(new THREE.Vector3(0, PLAYER_HEIGHT + 0.5, 0))
                        .add(backVector.multiplyScalar(4.0));
                    camera.position.lerp(targetCamPos, 0.2);
                }

                uiX.innerText = Math.round(playerPos.x);
                uiY.innerText = Math.round(playerPos.y);
                uiZ.innerText = Math.round(playerPos.z);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
