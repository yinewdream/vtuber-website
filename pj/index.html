<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作室專案計畫分類 - Project</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-purple: #f5f3ff;
            --primary-purple: #8b5cf6;
            --dark-purple: #4c1d95;
            --text-dark: #1e1b4b;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
            box-sizing: border-box;
            margin: 20px 0;
        }

        h1 { font-size: 2.5rem; color: var(--dark-purple); margin-bottom: 5px; }
        .subtitle { font-size: 1.1rem; color: #6d28d9; margin-bottom: 30px; font-weight: 500; }

        /* 📁 專案方塊排版 */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
            text-align: left;
        }

        .project-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(139, 92, 246, 0.1);
            transition: all 0.2s;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.1);
            border-color: var(--primary-purple);
        }

        .project-icon {
            font-size: 2rem;
            color: var(--primary-purple);
            margin-bottom: 15px;
        }

        .project-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--dark-purple);
            margin-bottom: 10px;
        }

        .project-desc {
            font-size: 0.95rem;
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .project-tag {
            display: inline-block;
            background: #f5f3ff;
            color: var(--primary-purple);
            font-size: 0.8rem;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 50px;
        }

        /* 返回主頁按鈕 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 35px;
            padding: 10px 20px;
            background: var(--primary-purple);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .back-btn:hover {
            background: var(--dark-purple);
            transform: translateX(-3px);
        }

        hr { border: 0; border-top: 1px solid rgba(139, 92, 246, 0.1); margin: 30px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>工作室專案計畫</h1>
        <div class="subtitle">Project Administration HUB</div>
        <p style="color: #6b7280;">這裡記錄了我們團隊核心開發、營運中或籌備中的重大專案分類。</p>

        <div class="project-grid">
            <div class="project-card">
                <div class="project-icon"><i class="fas fa-cubes"></i></div>
                <div class="project-title">Minecraft 遊戲伺服器</div>
                <div class="project-desc">基於高速網路架構的麥塊私人伺服器，提供社群夥伴最流暢、穩定的生存與連線遊玩體驗。</div>
                <div class="project-tag">營運中</div>
            </div>

            <div class="project-card">
                <div class="project-icon"><i class="fas fa-code"></i></div>
                <div class="project-title">Python 應用工具開發</div>
                <div class="project-desc">研發影像分析、影音自動化處理引擎等輕量級工具，全面提升工作室內部與藝人的產出效率。</div>
                <div class="project-tag">開發中</div>
            </div>

            <div class="project-card">
                <div class="project-icon"><i class="fas fa-music"></i></div>
                <div class="project-title">數位音樂與語音調教</div>
                <div class="project-desc">結合 AI 歌聲合成軟體（Synthesizer V）進行高精確度調教，籌備各項原創單曲與音樂發行計畫。</div>
                <div class="project-tag">籌備中</div>
            </div>
        </div>

        <hr>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> 返回基地主網頁</a>
        <p style="font-size: 0.9rem; color: #cbd5e1; margin-top: 25px;">© 2026 VTuber聚集地 - Project Hub</p>
    </div>

</body>
</html>
