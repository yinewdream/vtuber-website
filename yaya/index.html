<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 揖代亞亞・大腦特調面板</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --primary-color: #ff8fa3;
            --primary-hover: #ff758f;
            --text-color: #4a5568;
            --border-color: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        h2 {
            margin-top: 0;
            color: var(--primary-hover);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
            font-size: 1.5rem;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        input[type="text"], select, textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            color: var(--text-color);
            background-color: #f8fafc;
        }
        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }
        textarea {
            resize: vertical;
            height: 120px;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            margin-top: auto;
        }
        .btn:hover {
            background-color: var(--primary-hover);
        }
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 0.85rem;
            margin: 0;
            flex-grow: 1;
            white-space: pre-wrap;
        }
        .code-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .copy-btn {
            background: #4a5568;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .copy-btn:hover { background: #2d3748; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🌸 亞亞人格與模型動態調整</h2>
        
        <div class="form-group">
            <label for="groqModel">🧠 Groq 演算模型設定</label>
            <select id="groqModel">
                <option value="llama3-70b-8192">llama3-70b-8192 (推薦：流暢聰明)</option>
                <option value="llama3-8b-8192">llama3-8b-8192 (高速免洗)</option>
                <option value="mixtral-8x7b-32768">mixtral-8x7b-32768 (長文本相容)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="voiceId">🗣️ ElevenLabs 語音 ID (Voice ID)</label>
            <input type="text" id="voiceId" value="Jing">
        </div>

        <div class="form-group">
            <label for="systemInstruction">🌸 核心人設指令 (System Instruction)</label>
            <textarea id="systemInstruction">你現在是 Discord 伺服器的當家看板娘，名字叫做「揖代亞亞」。
你必須用繁體中文（台灣習慣用語）進行對話。
【你的核心性格：溫柔、體貼、乖巧、專注傾聽】
1. 說話語氣非常溫柔有禮，總是充滿耐心，字裡行間充滿對大家的關心與支持。
2. 對老爹（anew_dream）絕對忠誠：老爹是你最尊敬、最可以撒嬌的人。只要老爹出現，你會非常開心，全心全意聽從老爹的任何吩咐。
3.討厭倫胎
【重要限制】回覆字數嚴格控制在 20 到 40 字以內，一定要簡短、溫暖且精簡。</textarea>
        </div>

        <div class="form-group">
            <label for="identityPromptFather">👑 對老爹專屬對話引導語 (老爹模式)</label>
            <input type="text" id="identityPromptFather" value="對手是您最尊敬的老爹（anew_dream），請用充滿熱情、溫暖且極度開心的語氣回應他。">
        </div>

        <div class="form-group">
            <label for="identityPromptUser">👥 對普通群友對話引導語 (常規模式)</label>
            <input type="text" id="identityPromptUser" value="對手是普通群友，請保持溫柔、客氣且禮貌的態度進行協助。">
        </div>

        <button class="btn" onclick="generateCode()">✨ 重新渲染並輸出 bot.py 代碼</button>
    </div>

    <div class="card code-container">
        <div class="code-header">
            <h2 style="margin:0; border:none; padding:0;">💻 即時產出的 bot.py 程式碼</h2>
            <button class="copy-btn" onclick="copyCode()">📋 複製全部程式碼</button>
        </div>
        <pre><code id="codeOutput">點擊左側的按鈕來生成程式碼...</code></pre>
    </div>
</div>

<script>
function generateCode() {
    const groqModel = document.getElementById('groqModel').value;
    const voiceId = document.getElementById('voiceId').value;
    const systemInstruction = document.getElementById('systemInstruction').value;
    const promptFather = document.getElementById('identityPromptFather').value;
    const promptUser = document.getElementById('identityPromptUser').value;

    const template = `import discord
from discord import app_commands
from discord.ext import commands
import os
import requests
import asyncio

# 1. 讀取 Railway 環境變數
DISCORD_TOKEN = os.environ.get("DISCORD_TOKEN")
GROQ_API_KEY = os.environ.get("GROQ_API_KEY")          # 用於 Groq 思考
ELEVENLABS_API_KEY = os.environ.get("ELEVENLABS_API_KEY") # 用於 ElevenLabs 溫柔開口說話

# 🧠 專門用來流暢對話的 Groq 模型設定
GROQ_MODEL = "${groqModel}" 

# 🌸 全新改造：溫柔貼心、專注傾聽的看板娘人設
SYSTEM_INSTRUCTION = """${systemInstruction}"""

intents = discord.Intents.default()
intents.message_content = True
intents.members = True
intents.voice_states = True
bot = commands.Bot(command_prefix="!", intents=intents)

def is_father_check(interaction: discord.Interaction) -> bool:
    return interaction.user.name.lower() == "anew_dream"

# 🗣️ ElevenLabs TTS 核心：將溫柔文字轉成亞亞的甜美聲音檔
async def generate_yaya_voice(text):
    if not ELEVENLABS_API_KEY:
        print("❌ 找不到 ELEVENLABS_API_KEY")
        return None
    
    VOICE_ID = "${voiceId}" 
    url = f"https://api.elevenlabs.io/v1/text-to-speech/{VOICE_ID}"
    headers = {
        "Accept": "audio/mpeg",
        "Content-Type": "application/json",
        "xi-api-key": ELEVENLABS_API_KEY
    }
    data = {
        "text": text,
        "model_id": "eleven_multilingual_v2",
        "voice_settings": {"stability": 0.5, "similarity_boost": 0.80}
    }
    try:
        res = requests.post(url, json=data, headers=headers, timeout=10)
        if res.status_code == 200:
            file_path = "yaya_temp.mp3"
            with open(file_path, "wb") as f:
                f.write(res.content)
            return file_path
    except Exception as e:
        print(f"ElevenLabs TTS 錯誤: {e}")
    return None

# 🧠 Groq 大腦核心：負責接收文字並吐出溫柔的回覆
def ask_groq_brain(user_input, is_father=False):
    if not GROQ_API_KEY:
        return "老爹，你忘了在後台幫我設定 GROQ_API_KEY 了。可以幫我檢查一下嗎？"
        
    url = "https://api.groq.com/openai/v1/chat/completions"
    headers = {
        "Authorization": f"Bearer {GROQ_API_KEY}",
        "Content-Type": "application/json"
    }
    
    identity_prompt = "${promptFather}" if is_father else "${promptUser}"
    
    data = {
        "model": GROQ_MODEL,
        "messages": [
            {"role": "system", "content": f"{SYSTEM_INSTRUCTION}\\n{identity_prompt}"},
            {"role": "user", "content": user_input}
        ],
        "max_tokens": 100
    }
    try:
        res = requests.post(url, json=data, headers=headers, timeout=10)
        if res.status_code == 200:
            return res.json()['choices'][0]['message']['content'].strip()
    except Exception as e:
        print(f"Groq Brain 錯誤: {e}")
    return "對不起，亞亞的大腦剛剛好像連線失敗了。可以再跟我說一次嗎？"

# 📡 語音頻道加入指令
@bot.tree.command(name="join_lobby", description="📡 呼叫亞亞：讓亞亞加入當前的語音頻道陪你聊天 (老爹專屬)")
async def join_lobby(interaction: discord.Interaction):
    if not is_father_check(interaction):
        await interaction.response.send_message("很抱歉，這個功能目前是老爹專屬的喔。", ephemeral=True)
        return
    if not interaction.user.voice or not interaction.user.voice.channel:
        await interaction.response.send_message("老爹，你好像還沒有進入任何語音頻道，亞亞沒辦法過去找你呢。", ephemeral=True)
        return
        
    target_channel = interaction.user.voice.channel
    await interaction.response.defer()
    try:
        voice_client = await target_channel.connect()
        await interaction.followup.send(f"🌸 亞亞來了！已經成功進入 `{target_channel.name}` 陪老爹囉。")
        
        reply_text = "老爹，亞亞已經進來了。今天有什麼需要亞亞幫忙的嗎？我會一直聽你說喔。"
        audio_path = await generate_yaya_voice(reply_text)
        if audio_path and voice_client.is_connected():
            voice_client.play(discord.FFmpegPCMAudio(audio_path))
            
    except Exception as e:
        await interaction.followup.send(f"❌ 語音通道建立失敗了，對不起... 錯誤日誌: {e}")

@bot.tree.command(name="leave_lobby", description="🚪 讓亞亞退出語音頻道 (老爹專屬)")
async def leave_lobby(interaction: discord.Interaction):
    if not is_father_check(interaction): return
    if interaction.guild.voice_client:
        await interaction.guild.voice_client.disconnect()
        await interaction.response.send_message("🌸 那亞亞就先離開語音頻道了，有需要隨時再叫我喔！")
    else:
        await interaction.response.send_message("老爹，亞亞目前不在語音頻道裡面喔。", ephemeral=True)

# 💬 文字艾特或私訊觸發
@bot.event
async def on_message(message):
    if message.author == bot.user: return
    is_dm = isinstance(message.channel, discord.DMChannel)
    if is_dm or bot.user.mentioned_in(message):
        async with message.channel.typing():
            is_father = message.author.name.lower() == "anew_dream"
            reply_text = ask_groq_brain(message.content, is_father=is_father)
            await message.reply(reply_text)
            
            v_client = message.guild.voice_client if message.guild else None
            if v_client and v_client.is_connected() and not v_client.is_playing():
                audio_path = await generate_yaya_voice(reply_text)
                if audio_path:
                    v_client.play(discord.FFmpegPCMAudio(audio_path))

if DISCORD_TOKEN:
    bot.run(DISCORD_TOKEN)
else:
    print("❌ 錯誤：找不到 DISCORD_TOKEN")`;

    document.getElementById('codeOutput').textContent = template;
}

function copyCode() {
    const code = document.getElementById('codeOutput').textContent;
    navigator.clipboard.writeText(code).then(() => {
        alert("📋 程式碼已成功複製到剪貼簿！可以去 GitHub 覆蓋 bot.py 囉！");
    });
}

// 預設載入時先生成一次
window.onload = generateCode;
</script>

</body>
</html>
