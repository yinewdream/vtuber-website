<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber 工作室官方網站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #e0f2fe; 
            --primary-blue: #0369a1;
            --yt-red: #FF0000;
            --dc-purple: #5865F2;
            --dark-blue: #0c4a6e;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #1e293b;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ☰ 左上角選單按鈕 */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 24px;
            cursor: pointer;
            z-index: 90;
            color: var(--primary-blue);
            padding: 10px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .menu-btn:hover { background: rgba(3, 105, 161, 0.1); }

        /* 🪟 側邊欄選單本體 */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 5px 0 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar.active { left: 0; }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #bae6fd;
            padding-bottom: 15px;
        }
        .sidebar-title { font-size: 1.3rem; font-weight: bold; color: var(--primary-blue); }
        .close-btn { font-size: 24px; cursor: pointer; color: #64748b; }
        .close-btn:hover { color: var(--yt-red); }

        .menu-items { display: flex; flex-direction: column; gap: 10px; }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--dark-blue);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .menu-item i { margin-right: 15px; font-size: 1.2rem; width: 24px; text-align: center; color: var(--primary-blue); }
        .menu-item:hover { background: #e0f2fe; color: var(--primary-blue); transform: translateX(5px); }

        /* ⬛ 背景黑色遮罩 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.3); z-index: 95; display: none; backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }

        /* 📄 主容器 */
        .container {
            width: 90%;
            max-width: 650px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            box-sizing: border-box;
        }

        /* 頁面切換控制 */
        .page { display: none; }
        .page.active { display: block; }

        h1 { font-size: 2.8rem; color: var(--primary-blue); margin-bottom: 10px; }
        p { font-size: 1.1rem; color: #475569; line-height: 1.6; }
        .status-badge {
            display: inline-block; background: #bae6fd; color: #0369a1;
            padding: 6px 18px; border-radius: 50px; font-size: 0.9rem; margin-bottom: 20px; font-weight: bold;
        }

        .links { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 12px 25px; color: white; text-decoration: none;
            border-radius: 15px; font-weight: bold; font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn i { margin-right: 10px; font-size: 1.4rem; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-yt { background-color: var(--yt-red); }
        .btn-dc { background-color: var(--dc-purple); }

        /* 👥 VTuber 列表排版 */
        .vtuber-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .vtuber-card {
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.2s;
        }
        .vtuber-card:hover { transform: translateY(-5px); }

        /* 👑 藝人頭銜小標籤樣式 */
        .vtuber-title-tag {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            border: 1px solid #bae6fd;
        }

        .vtuber-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #bae6fd;
            margin-bottom: 12px;
            background-color: #f1f5f9;
        }

        .vtuber-name { font-size: 1.3rem; font-weight: bold; color: var(--dark-blue); margin: 5px 0 8px 0; }
        .vtuber-desc { font-size: 0.9rem; color: #64748b; min-height: 40px; margin-bottom: 15px; line-height: 1.4; }

        .btn-sm-yt {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--yt-red); color: white; text-decoration: none;
            padding: 8px 18px; border-radius: 10px; font-size: 0.85rem; font-weight: bold;
            transition: background 0.2s;
        }
        .btn-sm-yt:hover { background: #cc0000; }

        hr { border: 0; border-top: 1px solid rgba(0,0,0,0.05); margin: 30px 0; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title"><i class="fas fa-hub"></i> VTuber 聚集地</span>
            <div class="close-btn" onclick="toggleMenu()"><i class="fas fa-times"></i></div>
        </div>
        <div class="menu-items">
            <div class="menu-item" onclick="showPage('home')"><i class="fas fa-home"></i>基地首頁</div>
            <div class="menu-item" onclick="showPage('list')"><i class="fas fa-user-friends"></i>大 / 小 VTuber 列表</div>
            <div class="menu-item" onclick="alert('目前網站正在測試階段，敬請期待未來功能！')"><i class="fas fa-bullhorn"></i>最新動態公報</div>
            <a href="mailto:admin@vtuber.qd.je" class="menu-item" style="text-decoration:none;"><i class="fas fa-envelope"></i>商務與合作聯絡</a>
        </div>
    </nav>

    <div class="container">
        
        <div id="page-home" class="page active">
            <div class="status-badge"><i class="fas fa-tools"></i> 官網改版中</div>
            <h1>VTuber 工作室</h1>
            <p>歡迎來到Vtuber的基地！小揖正在對官網進行升級。我們將在這裡聚集大、小Vtuber，並分享最新的 V 藝人動態與創作連結。</p>
            <div class="links">
                <a href="https://www.youtube.com/@Anew_dream" target="_blank" class="btn btn-yt"><i class="fab fa-youtube"></i> YouTube 頻道</a>
                <a href="https://discord.gg/D5EpW8dmUA" target="_blank" class="btn btn-dc"><i class="fab fa-discord"></i> Discord 伺服器</a>
            </div>
        </div>

        <div id="page-list" class="page">
            <h1>成員名單</h1>
            <p>聚集在此的大、小 VTuber 藝人夥伴</p>
            <div class="vtuber-grid" id="vtuber-container">
                <p style="color:#94a3b8;"><i class="fas fa-spinner fa-spin"></i> 資料同步中...</p>
            </div>
        </div>
        
        <hr>
        <p style="font-size: 0.9rem; color: #94a3b8;">© 2026 VTuber聚集地 - 網站測試中</p>
    </div>

    <script>
        // 自動鎖定小揖的 Google 試算表後台網址
        const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1iaEgVqq3hUeSAD1cTIjPPONN0jd9SzYO4q40mixAb6E/gviz/tq?tqx=out:csv";

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            toggleMenu();
            if(pageId === 'list') { fetchVTubers(); }
        }

        // 🛡️ 高級 CSV 欄位切割器：防止網域與網址參數被切碎
        function parseCSVLine(text) {
            let p = '', r = [];
            let q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') { q = !q; }
                else if (c === ',' && !q) { r.push(p.trim()); p = ''; }
                else { p += c; }
            }
            r.push(p.trim());
            return r;
        }

        async function fetchVTubers() {
            const container = document.getElementById('vtuber-container');
            try {
                const response = await fetch(SPREADSHEET_CSV_URL);
                const data = await response.text();
                
                // 依換行切分，並過濾掉試算表第一行的標題欄位
                const lines = data.split(/\r?\n/).filter(line => line.trim() !== "");
                const rows = lines.slice(1); 
                container.innerHTML = '';
                
                if (rows.length === 0) {
                    container.innerHTML = '<p style="color:#94a3b8;">目前列表上還沒有成員喔！</p>';
                    return;
                }

                // 預設的酷炫二次元呆呆防護圖
                const defaultAvatar = "https://images.unsplash.com/photo-1578632767115-351597cf2477?w=150";

                rows.forEach(row => {
                    const cols = parseCSVLine(row);
                    if (cols.length >= 5 && cols[1] !== "") {
                        let [title, name, image, youtube, description] = cols;
                        
                        // 清除包在網址外面討厭的雙引號
                        image = image.replace(/^"|"$/g, '');
                        youtube = youtube.replace(/^"|"$/g, '');

                        container.innerHTML += `
                            <div class="vtuber-card">
                                <div class="vtuber-title-tag">${title || '成員'}</div>
                                <br>
                                <img src="${image || defaultAvatar}" class="vtuber-avatar" onerror="this.src='${defaultAvatar}'" alt="${name}">
                                <div class="vtuber-name">${name}</div>
                                <div class="vtuber-desc">${description}</div>
                                <a href="${youtube || '#'}" target="_blank" class="btn-sm-yt"><i class="fab fa-youtube"></i> 前往頻道</a>
                            </div>
                        `;
                    }
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = '<p style="color:#ef4444;">❌ 無法讀取後台資料，請確認試算表右上角已開啟「知道連結的任何人均可檢視」！</p>';
            }
        }
    </script>
</body>
</html>
