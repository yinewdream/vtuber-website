<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber 工作室官方網站</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #0f0f1a 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 2.5rem;
            color: #00ffcc;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,255,204,0.3);
        }
        p {
            font-size: 1.1rem;
            color: #cccccc;
            line-height: 1.6;
        }
        .status-badge {
            display: inline-block;
            background: #22c55e;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .links a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            color: #00ffcc;
            text-decoration: none;
            border: 1px solid #00ffcc;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        .links a:hover {
            background: #00ffcc;
            color: #121212;
            box-shadow: 0 0 15px rgba(0,255,204,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">官方網站建置中</div>
        <h1>VTuber 工作室</h1>
        <p>歡迎來到我們的全新起點！官方網站正在全力籌備中，未來將在此公開旗下 VTuber 的藝人資訊、最新活動與合作洽談。</p>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">
        <div class="links">
            <a href="#" target="_blank">YouTube 頻道</a>
            <a href="#" target="_blank">Discord 伺服器</a>
        </div>
    </div>
</body>
</html>
