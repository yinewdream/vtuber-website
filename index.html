<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber 工作室官方網站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #e0f2fe; /* 淺藍色背景 */
            --primary-blue: #0369a1;
            --yt-red: #FF0000;
            --dc-purple: #5865F2;
            --dark-blue: #0c4a6e;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #1e293b;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ☰ 左上角選單按鈕 */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 24px;
            cursor: pointer;
            z-index: 90;
            color: var(--primary-blue);
            padding: 10px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .menu-btn:hover {
            background: rgba(3, 105, 161, 0.1);
        }

        /* 🪟 側邊欄選單本體 */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px; /* 預設藏在外面 */
            width: 280px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 5px 0 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 當啟動時滑出 */
        .sidebar.active {
            left: 0;
        }

        /* 選單頂部區塊（放置你要求的標題） */
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #bae6fd;
            padding-bottom: 15px;
        }

        .sidebar-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-blue);
        }

        /* ❌ 關閉按鈕 */
        .close-btn {
            font-size: 24px;
            cursor: pointer;
            color: #64748b;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: var(--yt-red);
        }

        /* 🔗 選單項目連結 */
        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--dark-blue);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .menu-item i {
            margin-right: 15px;
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
            color: var(--primary-blue);
        }

        .menu-item:hover {
            background: #e0f2fe;
            color: var(--primary-blue);
            transform: translateX(5px);
        }

        /* ⬛ 背景黑色遮罩 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            z-index: 95;
            display: none;
            backdrop-filter: blur(2px);
        }

        .overlay.active {
            display: block;
        }

        /* 📄 主容器 */
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 2.8rem;
            color: var(--primary-blue);
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #475569;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-block;
            background: #bae6fd;
            color: #0369a1;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 25px;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn i {
            margin-right: 10px;
            font-size: 1.4rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-yt { background-color: var(--yt-red); }
        .btn-dc { background-color: var(--dc-purple); }

        hr {
            border: 0;
            border-top: 1px solid rgba(0,0,0,0.05);
            margin: 30px 0;
        }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title"><i class="fas fa-hub"></i> VTuber 聚集地</span>
            <div class="close-btn" onclick="toggleMenu()">
                <i class="fas fa-times"></i>
            </div>
        </div>
        <div class="menu-items">
            <a href="#" class="menu-item" onclick="toggleMenu()">
                <i class="fas fa-home"></i>基地首頁
            </a>
            <a href="#" class="menu-item" onclick="alert('藝人名單籌備中！')">
                <i class="fas fa-user-friends"></i>大 / 小 VTuber 列表
            </a>
            <a href="#" class="menu-item" onclick="alert('目前網站正在測試階段，敬請期待未來功能！')">
                <i class="fas fa-bullhorn"></i>最新動態公報
            </a>
            <a href="mailto:admin@vtuber.qd.je" class="menu-item">
                <i class="fas fa-envelope"></i>商務與合作聯絡
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="status-badge"><i class="fas fa-tools"></i> 官網改版中</div>
        <h1>VTuber 工作室</h1>
        <p>歡迎來到Vtuber的基地！小揖正在對官網進行升級。我們將在這裡聚集大、小Vtuber，並分享最新的 V 藝人動態與創作連結。</p>
        
        <div class="links">
            <a href="https://www.youtube.com/@Anew_dream" target="_blank" class="btn btn-yt">
                <i class="fab fa-youtube"></i> YouTube 頻道
            </a>
            <a href="https://discord.gg/D5EpW8dmUA" target="_blank" class="btn btn-dc">
                <i class="fab fa-discord"></i> Discord 伺服器
            </a>
        </div>
        
        <hr>
        <p style="font-size: 0.9rem; color: #94a3b8;">© 2026 VTuber聚集地 - 網站測試中</p>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

</body>
</html>
